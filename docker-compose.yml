# Interwall Inventory OS — Docker Compose Stack
# 3 containers: postgres (data), api (FastAPI + email poller), nginx (frontend + proxy)

services:

  postgres:
    image: postgres:15-alpine
    container_name: interwall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: interwall
      POSTGRES_USER: interwall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interwall_dev_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./apps/api/sql/02_seed_gs1_products.sql:/docker-entrypoint-initdb.d/02_seed_gs1_products.sql:ro
      - ./apps/api:/app:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interwall -d interwall"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - interwall_network

  api:
    build: ./apps/api
    container_name: interwall-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://interwall:${POSTGRES_PASSWORD:-interwall_dev_secret}@postgres:5432/interwall
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-min-32-chars}
      IMAP_SERVER: ${IMAP_SERVER:-}
      IMAP_EMAIL: ${IMAP_EMAIL:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
    volumes:
      - ./apps/api/tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interwall_network

  nginx:
    image: nginx:alpine
    container_name: interwall-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-1441}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./inventory-interwall/frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - interwall_network

volumes:
  pgdata:
    name: interwall_pgdata

networks:
  interwall_network:
    name: interwall_network
    driver: bridge
