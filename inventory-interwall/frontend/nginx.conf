server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Explicitly serve static assets, no fallback
    # Add no-cache for JS/CSS to bypass CDN cache during development
    location ~ \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~ \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
    }

    # SPA routing for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to InvenTree backend
    location /api/ {
        proxy_pass http://inventree-server:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Media files from InvenTree
    location /media/ {
        proxy_pass http://inventree-server:8000/media/;
    }

    # Proxy Static files from InvenTree (if needed for admin)
    location /static/ {
        proxy_pass http://inventree-server:8000/static/;
    }

    # Proxy Config API (email automation) for HTTPS compatibility
    # Use container name since both are on inventree_network
    location /config-api/ {
        proxy_pass http://omiximo-email-automation:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
