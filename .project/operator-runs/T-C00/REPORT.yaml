task_id: T-C00
status: complete

summary: |
  Refreshed the C00 UI-state audit against current v2 truth and wrote it to
  .project/C00-UI-STATE-AUDIT.md. The preserved off-branch audit at
  interwall-preserve-2026-04-15/live-tree/.project/C00-UI-STATE-AUDIT.md is
  stale on several points — most importantly it treats shelf-config.js as
  active runtime, but shelf-config.js is neither loaded by index.html nor
  present in inventory-interwall/frontend/ on v2.

  Current active runtime (confirmed against inventory-interwall/frontend/
  index.html:1371-1396): env.js, config.js, api.js, router.js, settings.js,
  zone-config.js, zone-manager.js, bin-info-modal.js, wall.js, scanner.js,
  handshake.js, catalog-core.js, catalog-detail.js, part-manager.js,
  bin-modal.js, ui.js, history.js, auth.js, compositions.js, labels.js,
  profit.js, tenant.js, app-init.js. index.html loads none of app.js,
  app-1770129675.js, profit-1770129675.js, or shelf-config.js.

  Corrections vs. preserved audit:
    - wall.js no longer bulk-aggregates stock client-side; it now consumes
      v_shelf_occupancy via api.getShelfOccupancy(). Only A+B+base sum,
      A+base display merge (renderOccupancy), and hardcoded status bands
      remain in browser.
    - bin-info-modal.js reads from wall.occupancyByCell and writes via
      api.updateShelf(); shelfConfig localStorage path is gone.
    - api.js getAvailableStock() was removed; helpers are now
      getShelfOccupancy / getPartStockSnapshot / getProductsWithStock /
      updateShelf.
    - catalog-core.js no longer hardcodes in_stock: 0; in_stock comes from
      canonical v_part_stock via api.getProductsWithStock.

  Still live D-040 / D-041 / D-045 / D-046 surfaces remain (zone-config
  localStorage, jit_config + browser ROP, profit.js transaction +
  totalMargin + fixed_components localStorage, renderSummary mis-using
  totalMargin as Today's Margin, fetchInvenTreeSalesOrders repricing,
  handshake client-authored FIFO, hardcoded thresholds in wall.js 5/15,
  bin-info-modal 20% fill, catalog-core 0.5*minStock, profit.js VAT /
  commission / overhead DEFAULTS, and unsanitized innerHTML sinks in
  profit.js / history.js / labels.js / tenant.js / catalog-detail.js).

  Task routing: T-C02c for browser stock authority / business storage,
  T-C11 for sanitize + hardcoded-value debt, T-C03 only for the
  zone-config localStorage topology move.

