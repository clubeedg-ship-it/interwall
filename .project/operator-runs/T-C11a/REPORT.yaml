summary: |
  Routed unsanitized innerHTML sinks in tenant.js, labels.js, history.js,
  and profit.js (high-signal only) through sanitize(). Rebuilt the
  catalog-detail.js supplier URL block with DOM APIs (createElement,
  setAttribute, textContent) and an http/https protocol gate so neither
  the href nor the link text is assembled from user-controlled strings
  via innerHTML. Extended coverage into the transaction-card
  "Components Used" row (c.partName, c.qty). Verify script asserts each
  listed identifier appears only as sanitize(...) or is gone from the
  innerHTML block.

