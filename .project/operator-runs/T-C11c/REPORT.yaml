adversarial_review:
  - Script load order — config.js defines THRESHOLDS/DEFAULTS and already
    loads first in index.html before all sink files (wall.js, bin-info-modal.js,
    catalog-core.js, profit.js), so global references resolve at call time.
  - profit.js has several nested objects whose own member named `DEFAULTS`
    (costConfig.DEFAULTS, fixedComponentsConfig.DEFAULTS). The global
    `DEFAULTS` constant is referenced by bare identifier only inside the
    initializer for costConfig.DEFAULTS (`value: DEFAULTS.VAT_RATE`), where
    JS resolves to the outer binding, not the property being defined — so
    no self-reference or shadow bug. `this.DEFAULTS` call sites are untouched.
  - Literal values copied verbatim (5, 15, 20, 0.5, 21, 6.2, 0.062, 95.00);
    no behavior drift. Catalog `inStock < minStock` (no ratio) left as-is
    since it is not a threshold literal.

open_questions:
  - profit.js line 1693 has a render-time fallback `vatEntry.value : 21` for
    DB-sourced transactions with missing VAT rows, and line 792 has a
    `sanitize(bd.vatRate || 21)` label fallback. These mirror the default
    VAT rate but are display fallbacks on persisted historical data, not
    "DEFAULTS when backend config absent". Left literal per the "leave
    ambiguous literals literal and flag" rule. Coach to decide whether a
    future pass should collapse them to DEFAULTS.VAT_RATE.
  - profit.js line 1862/1865 have render-time commission/overhead fallbacks
    (`0.062`, `0`) in buildFromOrder path. The `0.062` matches
    DEFAULTS.COMMISSION_RATE; the `0` is a distinct "no overhead row found"
    sentinel, not the default 95. Left literal for the same reason.

