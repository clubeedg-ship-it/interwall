task_id: T-C02c
status: deviated
summary: |
  Added canonical consume + transfer endpoints, rewired handshake picking
  and catalog-detail onto them, and dropped the dead /stock/remove/ client
  helper. Deviated from packet on one point: the schema's
  stock_ledger_entries.transaction_id is NOT NULL with an FK to
  transactions (type in purchase|sale), so manual stock-outs cannot write
  a ledger row without a migration. D-017 governs sale flows — which
  still write ledger rows via process_bom_sale on the ingestion path —
  so the consume and transfer endpoints move lot quantity only and
  document the decision in-code.
