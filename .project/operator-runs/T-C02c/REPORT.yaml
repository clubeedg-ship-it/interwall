adversarial_review:
  - |
    Deviated: neither consume nor transfer writes stock_ledger_entries.
    Schema blocks the packet's VALUES (NULL, lot_id, ...) plan —
    transaction_id is NOT NULL, type ∈ {purchase, sale}, qty_delta <> 0.
    Sales still produce ledger rows via process_bom_sale on ingestion,
    so D-017 remains satisfied where it actually applies.
  - |
    consume_lot is not idempotent: a retry after a successful decrement
    will decrement again. Handshake picks are human-triggered one-offs
    so this is tolerable for now, but the lack of idempotency key leaves
    the door open to double-pick on flaky networks.
  - |
    catalog-detail.js batchEditor gates the transfer on a UUID-shape
    check for both lot id and shelf id. Legacy InvenTree-int state shapes
    silently short-circuit with a toast. Correct behaviour in a
    transitional codebase, but it also means a subtle wiring bug that
    keeps legacy ints flowing will look like "nothing happens" to the
    user — needs replacement with canonical lot-list wiring in a
    follow-up UI slice.
open_questions:
  - |
    Do we want a non-sale transaction type (e.g. 'adjustment') plus a
    nullable stock_ledger_entries.transaction_id to record manual
    stock-out history? That's the only way to regain a full audit trail
    for handshake picks — requires a migration so it is out of scope
    here.
  - |
    Partial-qty transfer splits the lot and preserves received_at, so
    FIFO order remains stable. Confirm the coach is happy with two
    distinct lot rows for the same physical receipt after a split.
next_ready: true
