task_id: T-C03
status: done
summary: |
  Moved wall zone topology off localStorage (D-040). New /api/zones
  router (GET list with shelf-derived cols/levels, POST create, PATCH
  rename/activate) registered in main.py. zone-config.js now keeps an
  in-memory cache populated by api.request('/api/zones', ...), and
  wall.loadLiveData refreshes the cache + re-renders on topology change.
  zone-manager's dead InvenTree createZoneLocations path was removed.
  bin-info-modal.js already reads zone metadata via wall.occupancyByCell
  with no localStorage, so no change was required there — smaller diff
  than the packet's expected list but no feature gap.
