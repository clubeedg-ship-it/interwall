adversarial_review:
  - Parts-stock-truth test currently skips rather than asserting — a real DOM-vs-canonical check still has to be wired once the harness gets session auth (cookie injection or a fixture login). Until then the harness cannot catch stock-rendering regressions on the catalog.
  - Selectors in parts-stock-truth assume data-ean / .part-card / .stock class hooks that may not exist in catalog DOM; the test skips on missing data-ean but a richer selector-audit is needed once the stack has seeded parts and auth.
  - Harness runs with workers=1 against a shared stack, so any test that mutates state will leak into sibling tests; packet only adds read-only smoke, but the pattern will need per-test seed/reset once feature specs land.

open_questions:
  - How should e2e authenticate against /api/products and /api/profit/valuation? Options: share a test session cookie via env var, storageState fixture produced by a login spec, or a backend test-only auth bypass. Recommend storageState + dedicated test user.
  - Should the harness own `docker compose up -d` / readiness probing, or stay assume-stack-is-up? Current design assumes up; a future packet could add a global-setup that waits on /api/health/ping.

