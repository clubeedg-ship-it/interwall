summary: |
  Added GET /api/stock-lots (active) and GET /api/stock-lots/history
  (active + depleted + ledger movements) to the existing stock_lots
  router (D-043). Built a new frontend Batches view (batches.js) with
  JIT-health gradients via THRESHOLDS (D-045), a full-history toggle,
  and a side panel showing per-lot ledger movements. Wired the #batches
  route through router.js and added a sidebar nav item + view section
