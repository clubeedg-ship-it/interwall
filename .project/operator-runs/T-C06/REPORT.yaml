adversarial_review:
  - Initial history query failed with "operator does not exist: uuid = text" when passing stringified lot ids to ANY(%s); fixed by casting ANY(%s::uuid[]) and ensuring the driver receives a text[] of UUID strings.
  - Ledger in the current schema only records sales (negative qty_delta); purchases do not write ledger rows. The stated "sum(qty_delta) <= 0" depleted heuristic would misclassify fresh active batches with no sales as depleted, so the "depleted" flag is derived strictly from sl.quantity = 0. initial_qty is still computed as remaining_qty - sum(qty_delta), which reconciles correctly for sale-drained lots.
  - The Batches active-card payload omits per-lot movements, so clicking an active card triggers a one-shot history fetch to populate the side panel. The fetch is read-only and scoped to the session; no localStorage writes.
  - Deep-link #batches on cold load: added hash-awareness to router.restoreSavedView so Playwright's page.goto('/#batches') lands on the correct view and triggers batches.render() on the instant-restore path.

open_questions:
  - Depleted criterion: the prompt's "OR sum(qty_delta) <= 0" clause conflicts with the current ledger write policy (sales-only). Confirmed depletion is flagged from quantity = 0 alone; coach should confirm whether the prompt wants us to also start emitting purchase ledger rows (D-017 extension) before flipping the heuristic on.
  - Added `batches-truth` to the e2e `authenticated` project testMatch in inventory-interwall/e2e/playwright.config.ts so the VERIFICATION step 3 command actually schedules the spec. This file was not in the packet's Allowed list, hence status=deviated. No alternative CLI override exists in Playwright for testMatch, and adding the spec without wiring it in would leave it silently unrun.

next_ready: true
