summary: |
  Wired a storageState-based auth fixture into the Playwright harness:
  fixtures/auth.ts logs in via POST /api/auth/login at globalSetup and
  persists the session cookie to .auth/state.json (gitignored). Split
  playwright.config.ts into two projects — "unauth" for smoke and
  "authenticated" which loads the saved storageState. Rewrote
  parts-stock-truth to assert DOM-vs-canonical (catalog .stock-qty vs
  /api/profit/valuation total_qty by EAN) and added two new truth
  specs: wall-occupancy-truth and profit-summary-truth. Ran against the
  live stack with INTERWALL_E2E_USER/PASS set: 4 passed, 1 skipped.
  Wall spec skipped cleanly because /api/shelves/occupancy currently
  500s (v_shelf_occupancy DB view is missing) — the skip message
  captures the upstream gap.

