adversarial_review:
  - Storage state bakes in a single session cookie for the whole run; if the Starlette SessionMiddleware secret rotates (or the server restarts with a new secret) mid-run, every authenticated spec will silently 401. The fixture should arguably re-login on first 401 retry, but that's out of scope for this packet.
  - globalSetup writes an empty state.json when env vars are missing and only warns — a developer running `npx playwright test` without creds sees smoke pass and authenticated specs fail on 200-vs-401 assertions rather than a clear "creds not set" stop. Acceptable for now because the warning is loud, but a stricter mode (fail fast when project=authenticated is selected without creds) would reduce confusion.
  - wall-occupancy-truth currently always skips because v_shelf_occupancy is missing from the seeded DB; the harness has no way to flag the difference between "nothing to test" and "the feature is broken upstream". A separate infra packet should restore the view or replace the endpoint query before this spec becomes load-bearing.

open_questions:
  - Should the DB view `v_shelf_occupancy` be restored (or the shelves.py query rewritten to compute occupancy inline) before wall-occupancy-truth can assert for real? Likely next packet, e.g. T-D-shelf-occupancy.
  - Is `admin` / `admin123` the right session for CI, or should a dedicated `e2e_test_user` be seeded with read-only scope? Non-blocking — the harness only reads today — but worth deciding before the authenticated suite grows mutating specs.

next_ready: true
